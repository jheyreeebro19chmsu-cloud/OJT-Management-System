name: Backend CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  backend-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: [3.10]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install system packages
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential cmake libopenblas-dev liblapack-dev libjpeg-dev libpng-dev libboost-all-dev pkg-config

      - name: Install pip deps
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Apply migrations
        working-directory: backend
        run: |
          python manage.py migrate --noinput

      - name: Run smoke tests
        working-directory: backend
        env:
          DJANGO_SETTINGS_MODULE: ojt_backend.settings
        run: |
          python tmp_smoketest.py

  ml-tests:
    # Run ML-only checks on manual dispatch to avoid heavy builds on every push
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: [3.10]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install system packages (ML)
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential cmake libopenblas-dev liblapack-dev libjpeg-dev libpng-dev libboost-all-dev pkg-config

      - name: Install pip deps (including optional ML)
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-optional.txt

      - name: Apply migrations
        working-directory: backend
        run: |
          python manage.py migrate --noinput

      - name: Verify ML packages
        working-directory: backend
        run: |
          python - <<'PY'
          import importlib, sys
          print('dlib:', bool(importlib.util.find_spec('dlib')))
          print('face_recognition:', bool(importlib.util.find_spec('face_recognition')))
          print('face_recognition_models:', bool(importlib.util.find_spec('face_recognition_models')))
          PY
