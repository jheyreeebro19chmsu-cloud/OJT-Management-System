name: Backend CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  backend-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: [3.10]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install system packages
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential cmake libopenblas-dev liblapack-dev libjpeg-dev libpng-dev libboost-all-dev pkg-config

      - name: Install pip deps
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          # Install face_recognition_models from git if it's not in PyPI
          pip install git+https://github.com/ageitgey/face_recognition_models

      - name: Apply migrations
        working-directory: backend
        run: |
          python manage.py migrate --noinput

      - name: Run smoke tests
        working-directory: backend
        env:
          DJANGO_SETTINGS_MODULE: ojt_backend.settings
        run: |
          python tmp_smoketest.py
