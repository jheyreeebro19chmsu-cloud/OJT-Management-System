$kind: http-request
name: POST Submit Announcement Response
method: POST
url: '{{base_url}}/api/announcement/submit/'
order: 3000
description: |-
  Submit a student's response to an instructor's announcement.
  
  Allows students to reply to announcements (e.g., submitting weekly reports).
  Accepts either JSON (with optional base64 image) or multipart form-data.
  
  **Response Status:** 201 Created
  
  **Example Response:**
  ```json
  {
    "success": true,
    "submission_id": 1,
    "submitted_at": "2026-05-27T10:00:00+08:00",
    "image_url": null
  }
  ```
headers:
  - key: Content-Type
    value: application/json
body:
  type: json
  content: |-
    {
      "announcement_id": 1,
      "user_id": 1,
      "message": "Submitted my report.",
      "image_b64": null
    }
