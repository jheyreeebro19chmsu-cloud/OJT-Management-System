$kind: http-request
name: GET Get Announcements
method: GET
url: '{{base_url}}/api/announcement/list/'
order: 2000
description: |-
  Retrieve all announcements posted by a specific instructor.
  
  The `instructor_id` query parameter is required. Returns a list of announcements
  with their content, timestamps, and optional image URLs.
  
  **Example Response:**
  ```json
  {
    "success": true,
    "announcements": [
      {
        "id": 1,
        "title": "Weekly Report Due",
        "content": "Please submit your weekly DTR report by Friday.",
        "created_at": "2026-05-27T08:00:00+08:00",
        "updated_at": "2026-05-27T08:00:00+08:00",
        "image_url": null
      }
    ]
  }
  ```
queryParams:
  - key: instructor_id
    value: '1'
    description: 'Required. The ID of the instructor whose announcements to retrieve.'
