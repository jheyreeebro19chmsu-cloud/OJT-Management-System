services:
  - type: web
    name: ojt-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: python manage.py runserver 0.0.0.0:$PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
  - type: web
    name: ojt-frontend
    env: static
    rootDir: .
    buildCommand: npm run build
    startCommand: serve -s dist
    publishPath: dist
    routes:
      - type: rewrite
        source: "/(.*)"
        destination: "/index.html"

  - type: web
    name: ojt-frontend
    env: static
    rootDir: .
    buildCommand: npm run build
    startCommand: serve -s dist
    publishPath: dist
    routes:
      - type: rewrite
        source: "/*"
        destination: "/index.html"